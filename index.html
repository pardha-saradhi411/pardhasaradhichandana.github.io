<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pardha Saradhi Chandana — RAN / Radio System & Automation Test Engineer</title>
<meta name="description" content="RAN / Radio System & Automation Test Engineer with 4+ years validating LTE & 5G NR networks. Specialising in ORAN, protocol debug, and Python / Robot Framework automation." />
<meta name="keywords" content="RAN Test Engineer, 5G NR, LTE, ORAN, Carrier Aggregation, VoLTE, QXDM, Wireshark, Python Automation, Robot Framework, Parallel Wireless, Mavenir" />
<meta name="author" content="Pardha Saradhi Chandana" />
<meta property="og:title" content="Pardha Saradhi Chandana — RAN / Automation Test Engineer" />
<meta property="og:description" content="Validating LTE & 5G NR networks across feature, performance, and stability. 4+ years across Parallel Wireless and Mavenir Systems." />
<meta property="og:type" content="profile" />
<meta property="og:locale" content="en_US" />
<meta name="theme-color" content="#0c0c0d" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #0c0c0d;
    --bg-soft:   #131316;
    --surface:   #16171b;
    --hairline:  rgba(239, 232, 219, 0.08);
    --hairline-strong: rgba(239, 232, 219, 0.18);
    --ink:       #efe8db;
    --ink-dim:   #b8b1a4;
    --ink-faint: #6f6a62;
    --accent:    #e3b04b;
    --accent-rgb: 227, 176, 75;
    --accent-soft: rgba(227, 176, 75, 0.12);
    --signal:    #7ec4a8;

    --serif: 'Fraunces', 'Times New Roman', serif;
    --sans:  'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

    --ease:   cubic-bezier(0.22, 1, 0.36, 1);
    --ease-2: cubic-bezier(0.65, 0, 0.35, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
  }

  /* Custom cursor — hide native on pointer devices */
  @media (hover: hover) and (pointer: fine) {
    body, body * { cursor: none !important; }
  }

  /* Ambient gradients + grain (z=0, content z=2) */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(1200px 700px at 88% -8%, rgba(227, 176, 75, 0.07), transparent 60%),
      radial-gradient(900px 600px at -8% 110%, rgba(126, 196, 168, 0.04), transparent 60%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ───── Network mesh canvas (background, z=1) ───── */
  #meshCanvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.85;
  }
  @media (prefers-reduced-motion: reduce) {
    #meshCanvas { display: none; }
  }

  /* ───── Cursor ───── */
  .cursor-outer, .cursor-inner {
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    border-radius: 50%;
    z-index: 9998;
    transform: translate(-50%, -50%);
    will-change: transform, width, height;
  }
  .cursor-outer {
    width: 34px; height: 34px;
    border: 1.5px solid var(--ink);
    mix-blend-mode: difference;
    transition: width .35s var(--ease), height .35s var(--ease),
                background-color .25s var(--ease), border-color .25s var(--ease),
                opacity .25s var(--ease);
  }
  .cursor-inner {
    width: 6px; height: 6px;
    background: var(--ink);
    mix-blend-mode: difference;
    z-index: 9999;
    transition: opacity .2s var(--ease);
  }
  .cursor-outer.is-hover { width: 64px; height: 64px; background: var(--accent-soft); border-color: var(--accent); }
  .cursor-outer.is-hover ~ .cursor-inner { opacity: 0; }
  .cursor-outer.is-text { width: 4px; height: 30px; border-radius: 2px; background: var(--accent); border-color: transparent; }
  .cursor-outer.is-link { width: 80px; height: 80px; border-color: var(--accent); }
  @media (hover: none), (pointer: coarse) {
    .cursor-outer, .cursor-inner { display: none; }
  }

  /* ───── Layout ───── */
  .wrap {
    max-width: 1240px; margin: 0 auto;
    padding: 0 32px;
    position: relative; z-index: 2;
  }
  @media (max-width: 640px) { .wrap { padding: 0 22px; } }
  main { position: relative; z-index: 2; }

  /* ───── Top nav ───── */
  nav.top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 60;
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    background: rgba(12, 12, 13, 0.6);
    border-bottom: 1px solid var(--hairline);
    transition: transform .35s var(--ease);
  }
  nav.top.hidden { transform: translateY(-100%); }
  nav.top .row {
    max-width: 1240px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px;
  }
  .brand {
    text-decoration: none; color: var(--ink);
    display: flex; align-items: center; gap: 12px;
    font-family: var(--serif); font-weight: 500;
    font-size: 17px; letter-spacing: -0.01em;
  }
  .brand .mark {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--hairline-strong);
    border-radius: 50%;
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    color: var(--accent);
  }
  .nav-links { display: flex; gap: 4px; align-items: center; }
  .nav-links a {
    color: var(--ink-dim); text-decoration: none;
    font-size: 13px; font-weight: 500;
    padding: 9px 14px; border-radius: 999px;
    transition: color .25s var(--ease);
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a.cta {
    color: var(--bg); background: var(--ink);
    margin-left: 10px; font-weight: 600;
    padding: 9px 18px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .25s var(--ease), color .25s var(--ease);
  }
  .nav-links a.cta:hover { background: var(--accent); color: var(--bg); }
  .nav-links a.cta .arr { transition: transform .25s var(--ease); }
  .nav-links a.cta:hover .arr { transform: translate(2px, -2px); }
  .menu-btn { display: none; background: none; border: 1px solid var(--hairline-strong); width: 38px; height: 38px; border-radius: 50%; color: var(--ink); }
  @media (max-width: 860px) {
    .nav-links { display: none; }
    .nav-links.open {
      display: flex; flex-direction: column;
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--bg-soft); border-bottom: 1px solid var(--hairline);
      padding: 14px 22px 22px; gap: 4px;
    }
    .nav-links.open a { width: 100%; padding: 12px 14px; }
    .menu-btn { display: inline-flex; align-items: center; justify-content: center; }
  }

  /* ───── Side progress ───── */
  .side-nav {
    position: fixed;
    right: 28px;
    top: 50%; transform: translateY(-50%);
    z-index: 40;
    display: flex; flex-direction: column; gap: 18px;
  }
  .side-nav a {
    display: flex; align-items: center; gap: 12px;
    color: var(--ink-faint); text-decoration: none;
    font-family: var(--mono); font-size: 10.5px;
    letter-spacing: 1.2px; text-transform: uppercase;
    transition: color .25s var(--ease);
  }
  .side-nav a .ln {
    width: 22px; height: 1px; background: var(--ink-faint);
    transition: width .35s var(--ease), background .25s var(--ease);
  }
  .side-nav a .lbl { opacity: 0; transform: translateX(-6px); transition: opacity .3s var(--ease), transform .3s var(--ease); }
  .side-nav a:hover, .side-nav a.active { color: var(--ink); }
  .side-nav a:hover .ln, .side-nav a.active .ln { width: 40px; background: var(--accent); }
  .side-nav a:hover .lbl, .side-nav a.active .lbl { opacity: 1; transform: translateX(0); }
  @media (max-width: 1024px) { .side-nav { display: none; } }

  /* ───── Hero ───── */
  .hero { padding: 160px 0 60px; position: relative; }
  .hero .available {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 6px 14px 6px 10px;
    border: 1px solid var(--hairline-strong);
    border-radius: 999px;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.6px;
    margin-bottom: 30px;
    background: rgba(19, 19, 22, 0.5);
    backdrop-filter: blur(10px);
  }
  .hero .available .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0 0 rgba(126, 196, 168, 0.5);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(126, 196, 168, 0.5); }
    70% { box-shadow: 0 0 0 9px rgba(126, 196, 168, 0); }
    100% { box-shadow: 0 0 0 0 rgba(126, 196, 168, 0); }
  }
  .hero h1 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(48px, 9vw, 124px);
    line-height: 0.95;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin-bottom: 4px;
    font-variation-settings: 'opsz' 144;
  }
  .hero h1 .it { font-style: italic; font-weight: 300; color: var(--accent); }
  .hero h1 .sub-mark {
    display: inline-block;
    width: clamp(46px, 7vw, 100px);
    height: 1px;
    background: var(--ink);
    vertical-align: middle;
    margin: 0 0.2em 0.2em 0;
  }

  .hero-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 70px;
    margin-top: 56px;
    padding-top: 36px;
    border-top: 1px solid var(--hairline);
    align-items: start;
  }
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr; gap: 50px; }
  }

  .hero-left .lede {
    font-size: clamp(17px, 1.55vw, 21px);
    color: var(--ink-dim);
    max-width: 580px;
    line-height: 1.55;
    font-weight: 300;
    margin-bottom: 30px;
  }
  .hero-left .lede strong { color: var(--ink); font-weight: 500; }
  .hero-left .meta {
    font-family: var(--mono); font-size: 11.5px;
    color: var(--ink-faint);
    letter-spacing: 1.4px; text-transform: uppercase;
    display: flex; gap: 28px; flex-wrap: wrap;
    margin-bottom: 36px;
  }
  .hero-left .meta span { color: var(--ink-dim); }
  .hero-left .meta .k { color: var(--ink-faint); margin-right: 6px; }

  .hero-cta { display: flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 26px;
    font-size: 14px; font-weight: 500;
    text-decoration: none;
    border-radius: 999px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--ink);
    transition: background .3s var(--ease), color .3s var(--ease), border-color .3s var(--ease);
    will-change: transform;
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover { background: var(--accent); }
  .btn-ghost { border-color: var(--hairline-strong); color: var(--ink-dim); }
  .btn-ghost:hover { color: var(--ink); border-color: var(--ink); }
  .btn .arr { transition: transform .3s var(--ease); }
  .btn:hover .arr { transform: translate(3px, -3px); }

  /* ───── Radar visualisation ───── */
  .hero-right {
    display: flex; flex-direction: column; gap: 16px;
    align-items: center;
  }
  .radar-stage {
    position: relative;
    width: 100%; max-width: 380px;
    aspect-ratio: 1;
  }
  .radar-svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .radar-svg .ring {
    fill: none;
    stroke: rgba(var(--accent-rgb), 0.18);
    stroke-width: 0.4;
    stroke-dasharray: 2 2;
  }
  .radar-svg .ring-outer {
    fill: none;
    stroke: rgba(var(--accent-rgb), 0.4);
    stroke-width: 0.6;
  }
  .radar-svg .range-lbl, .radar-svg .angle {
    font-family: var(--mono);
    font-size: 4px;
    fill: rgba(184, 177, 164, 0.5);
    text-anchor: middle;
  }
  .radar-svg .angle { font-size: 5px; fill: rgba(184, 177, 164, 0.7); font-weight: 500; }
  .radar-svg .cross {
    stroke: rgba(239, 232, 219, 0.07);
    stroke-width: 0.3;
  }
  .radar-svg .sweep {
    transform-origin: 0 0;
    animation: radar-rotate 6s linear infinite;
  }
  @keyframes radar-rotate { to { transform: rotate(360deg); } }
  .radar-svg .blip {
    fill: var(--accent);
    opacity: 0;
  }
  .radar-svg .blip.b1 { animation: blip-ping 6s 0s ease-out infinite; }
  .radar-svg .blip.b2 { animation: blip-ping 6s 1.2s ease-out infinite; }
  .radar-svg .blip.b3 { animation: blip-ping 6s 2.4s ease-out infinite; }
  .radar-svg .blip.b4 { animation: blip-ping 6s 3.6s ease-out infinite; }
  .radar-svg .blip.b5 { animation: blip-ping 6s 4.8s ease-out infinite; }
  @keyframes blip-ping {
    0%   { opacity: 1; r: 2.5; }
    50%  { opacity: 0.45; r: 2; }
    100% { opacity: 0; r: 1.5; }
  }
  .radar-svg .pulse {
    fill: none;
    stroke: var(--accent);
    stroke-width: 0.6;
    transform-origin: center;
    transform-box: fill-box;
    animation: pulse-grow 2.6s ease-out infinite;
  }
  .radar-svg .pulse-2 { animation-delay: 1.3s; }
  @keyframes pulse-grow {
    0%   { transform: scale(0.4); opacity: 0.85; }
    100% { transform: scale(2.8); opacity: 0; }
  }
  .radar-svg .center-dot { fill: var(--accent); }
  .radar-svg .center-core { fill: var(--ink); }
  .radar-corner {
    position: absolute;
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: 1.2px;
  }
  .radar-corner.tl { top: 0; left: 0; }
  .radar-corner.tr { top: 0; right: 0; text-align: right; }
  .radar-corner.bl { bottom: 0; left: 0; }
  .radar-corner.br { bottom: 0; right: 0; text-align: right; }
  .radar-corner .v { color: var(--ink-dim); display: block; font-size: 10.5px; margin-top: 2px; }

  /* ───── Telemetry HUD ───── */
  .telemetry {
    width: 100%; max-width: 380px;
    font-family: var(--mono);
    font-size: 11px;
    border: 1px solid var(--hairline);
    border-radius: 4px;
    background: rgba(19, 19, 22, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 12px 14px;
  }
  .telemetry-head {
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 8px; margin-bottom: 10px;
    border-bottom: 1px solid var(--hairline);
  }
  .telemetry-led {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 7px rgba(126, 196, 168, 0.6);
    animation: pulse 1.4s infinite;
  }
  .telemetry-title {
    color: var(--ink-faint); letter-spacing: 1.5px;
    font-size: 9.5px; font-weight: 500;
  }
  .telemetry-sim {
    font-family: var(--mono);
    font-size: 8.5px;
    color: var(--accent);
    letter-spacing: 1.2px;
    padding: 1px 5px;
    border: 1px solid rgba(var(--accent-rgb), 0.6);
    border-radius: 2px;
    margin-left: 2px;
  }
  .telemetry-ts {
    margin-left: auto; color: var(--ink-dim); font-size: 10px;
  }
  .telemetry-rows {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 18px;
  }
  .telemetry .row {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .telemetry .k { color: var(--ink-faint); letter-spacing: 0.8px; font-size: 9.5px; }
  .telemetry .v { color: var(--ink); font-variant-numeric: tabular-nums; }
  .telemetry .v.accent { color: var(--accent); }

  /* ───── Scroll indicator ───── */
  .scroll-cue {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 10px;
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 2px;
  }
  .scroll-cue .ln {
    width: 1px; height: 36px;
    background: linear-gradient(180deg, var(--ink-faint), transparent);
    overflow: hidden;
    position: relative;
  }
  .scroll-cue .ln::after {
    content: ''; position: absolute;
    top: -16px; left: 0; right: 0; height: 16px;
    background: var(--accent);
    animation: scroll-dot 2.2s ease-in-out infinite;
  }
  @keyframes scroll-dot {
    0%   { transform: translateY(0);   }
    100% { transform: translateY(52px); }
  }

  /* ───── Marquee ───── */
  .marquee {
    overflow: hidden;
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
    margin: 80px 0 0;
    padding: 22px 0;
    position: relative;
    z-index: 2;
    background: rgba(12, 12, 13, 0.4);
    backdrop-filter: blur(4px);
  }
  .marquee-track {
    display: flex; gap: 56px;
    animation: scroll 40s linear infinite;
    white-space: nowrap;
    width: max-content;
  }
  .marquee-track span {
    font-family: var(--serif); font-style: italic; font-weight: 300;
    font-size: clamp(22px, 2.4vw, 32px);
    color: var(--ink-dim);
    letter-spacing: -0.01em;
  }
  .marquee-track .dot { color: var(--accent); font-size: 24px; align-self: center; font-style: normal; }
  @keyframes scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ───── Sections ───── */
  section { padding: 140px 0; position: relative; }
  @media (max-width: 768px) { section { padding: 90px 0; } }
  .section-head {
    display: grid; grid-template-columns: 1fr 2fr;
    gap: 60px; margin-bottom: 80px;
    align-items: end;
  }
  @media (max-width: 768px) {
    .section-head { grid-template-columns: 1fr; gap: 24px; margin-bottom: 50px; }
  }
  .eyebrow {
    font-family: var(--mono); font-size: 11.5px;
    color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 14px;
  }
  .eyebrow::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .section-head h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(34px, 4.4vw, 60px);
    line-height: 1.02; letter-spacing: -0.025em;
    margin-top: 18px;
  }
  .section-head h2 .it { font-style: italic; color: var(--ink-dim); font-weight: 300; }
  .section-head .lead {
    color: var(--ink-dim);
    font-size: 17px; line-height: 1.6;
    max-width: 580px;
  }

  /* Section content blocks need solid backdrop over canvas */
  .content-card {
    background: rgba(12, 12, 13, 0.4);
    backdrop-filter: blur(2px);
  }

  /* ───── About ───── */
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: start;
  }
  @media (max-width: 900px) { .about-grid { grid-template-columns: 1fr; gap: 50px; } }
  .about-text p {
    color: var(--ink-dim); font-size: 16.5px;
    line-height: 1.7; margin-bottom: 20px;
  }
  .about-text p strong { color: var(--ink); font-weight: 500; }
  .about-text .signature {
    font-family: var(--serif); font-style: italic;
    font-size: 28px; color: var(--accent);
    margin-top: 24px; letter-spacing: -0.01em;
  }
  .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--hairline);
    border: 1px solid var(--hairline);
  }
  .stat { background: var(--bg); padding: 28px 26px; transition: background .3s var(--ease); }
  .stat:hover { background: var(--bg-soft); }
  .stat .num {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(40px, 4.5vw, 56px);
    color: var(--ink); line-height: 1;
    letter-spacing: -0.03em;
  }
  .stat .num .unit { font-size: 0.4em; color: var(--ink-dim); margin-left: 4px; font-style: italic; }
  .stat .lbl {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: 1.4px; text-transform: uppercase;
    margin-top: 12px;
  }

  /* ───── Experience ───── */
  .work-list { border-top: 1px solid var(--hairline); background: rgba(12,12,13,0.4); }
  .work-item {
    display: grid; grid-template-columns: 80px 1fr auto;
    gap: 40px; padding: 40px 0;
    border-bottom: 1px solid var(--hairline);
    transition: background .35s var(--ease), padding .35s var(--ease);
    position: relative;
  }
  .work-item:hover { background: var(--bg-soft); padding-left: 24px; padding-right: 24px; }
  @media (max-width: 768px) {
    .work-item { grid-template-columns: 1fr; gap: 18px; padding: 32px 0; }
  }
  .work-item .idx {
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-faint); letter-spacing: 1.5px;
    padding-top: 8px;
  }
  .work-item h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(22px, 2.4vw, 30px);
    line-height: 1.2; letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .work-item h3 .role { color: var(--ink-dim); font-style: italic; }
  .work-item .where { color: var(--ink-dim); font-size: 14.5px; margin-bottom: 14px; }
  .work-item .where .client {
    color: var(--ink-faint); font-family: var(--mono);
    font-size: 11.5px; letter-spacing: 0.5px;
    margin-left: 10px; padding-left: 10px;
    border-left: 1px solid var(--hairline);
  }
  .work-item ul { list-style: none; margin-top: 12px; display: grid; gap: 8px; }
  .work-item ul li {
    color: var(--ink-dim); font-size: 14.5px;
    padding-left: 18px; position: relative;
    line-height: 1.55;
  }
  .work-item ul li::before { content: '—'; position: absolute; left: 0; top: 0; color: var(--accent); }
  .work-item ul li strong { color: var(--ink); font-weight: 500; }
  .work-item .when {
    font-family: var(--mono); font-size: 11.5px;
    color: var(--ink-faint);
    letter-spacing: 1px; text-transform: uppercase;
    text-align: right; padding-top: 14px; white-space: nowrap;
  }
  @media (max-width: 768px) { .work-item .when { text-align: left; padding-top: 0; } }

  /* ───── Capabilities ───── */
  .capabilities-layout {
    display: grid;
    grid-template-columns: 0.85fr 2fr;
    gap: 50px;
    align-items: start;
  }
  @media (max-width: 1080px) {
    .capabilities-layout { grid-template-columns: 1fr; gap: 36px; }
  }

  .protocol-stage { position: sticky; top: 110px; }
  @media (max-width: 1080px) { .protocol-stage { position: static; } }

  .ps-card {
    background: rgba(19, 19, 22, 0.65);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid var(--hairline);
    border-radius: 4px;
    overflow: hidden;
  }
  .ps-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--hairline);
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px;
  }
  .ps-head .ps-title {
    font-family: var(--serif);
    font-size: 18px;
    letter-spacing: -0.01em;
    font-weight: 500;
    line-height: 1.2;
  }
  .ps-head .ps-sub {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .ps-head .ps-spec {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 1px;
    border: 1px solid rgba(var(--accent-rgb), 0.5);
    padding: 2px 6px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .protocol-stack { position: relative; }
  .layer {
    display: grid;
    grid-template-columns: 36px 70px 1fr;
    gap: 14px;
    padding: 13px 22px;
    border-bottom: 1px solid var(--hairline);
    align-items: center;
    position: relative;
    transition: background .4s var(--ease);
  }
  .layer:last-child { border-bottom: none; }
  .layer::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 0;
    background: var(--accent);
    transition: width .35s var(--ease);
  }
  .layer .layer-l {
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-faint); letter-spacing: 1px;
  }
  .layer .layer-n {
    font-family: var(--serif); font-size: 17px;
    color: var(--ink); letter-spacing: -0.01em;
    font-weight: 500;
    transition: color .3s var(--ease);
  }
  .layer .layer-d {
    font-size: 11.5px; color: var(--ink-dim);
    text-align: right;
    font-family: var(--sans);
  }
  .layer.active { background: rgba(var(--accent-rgb), 0.08); }
  .layer.active::before { width: 3px; }
  .layer.active .layer-n { color: var(--accent); }
  .ps-footer {
    padding: 12px 22px;
    border-top: 1px solid var(--hairline);
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: 1px;
    display: flex; align-items: center; gap: 9px;
    text-transform: uppercase;
  }
  .ps-footer .ps-tag {
    width: 6px; height: 6px;
    background: var(--signal);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(126, 196, 168, 0.6);
    animation: pulse 1.4s infinite;
  }

  /* ───── Orbital skill constellation ───── */
  .orbit-stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    max-width: 420px;
    margin: 18px auto 22px;
  }
  .orbit-ring {
    position: absolute;
    top: 50%; left: 50%;
    border: 1px dashed rgba(var(--accent-rgb), 0.16);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: ring-rotate 60s linear infinite;
  }
  .orbit-ring.r-inner  { width: 38%;  aspect-ratio: 1; animation-duration: 35s; }
  .orbit-ring.r-middle { width: 66%;  aspect-ratio: 1; animation-duration: 55s; animation-direction: reverse; border-color: rgba(125, 211, 252, 0.14); }
  .orbit-ring.r-outer  { width: 95%;  aspect-ratio: 1; animation-duration: 90s; border-color: rgba(196, 181, 253, 0.12); }
  @keyframes ring-rotate {
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }
  .orbit-stage:hover .orbit-ring { animation-play-state: paused; }

  /* Central antenna hub */
  .orbit-hub {
    position: absolute;
    top: 50%; left: 50%;
    width: 72px; height: 72px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
  }
  .orbit-hub::before, .orbit-hub::after {
    content: '';
    position: absolute; inset: 8px;
    border-radius: 50%;
    border: 1px solid rgba(var(--accent-rgb), 0.5);
    animation: hub-pulse 2.6s ease-out infinite;
  }
  .orbit-hub::after { animation-delay: 1.3s; }
  @keyframes hub-pulse {
    0%   { transform: scale(0.55); opacity: 0.85; }
    100% { transform: scale(2.2);  opacity: 0;    }
  }
  .orbit-hub .core {
    position: relative;
    width: 52px; height: 52px;
    background: radial-gradient(circle at 35% 25%, #1a1a1f, #0a0a0c);
    border-radius: 50%;
    border: 1px solid rgba(var(--accent-rgb), 0.5);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 30px rgba(var(--accent-rgb), 0.25), inset 0 0 12px rgba(var(--accent-rgb), 0.1);
    z-index: 2;
  }
  .orbit-hub svg { width: 26px; height: 26px; color: var(--accent); }

  /* Orbiting chips */
  .orbit-chip {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 11px;
    border-radius: 999px;
    background: rgba(15, 15, 18, 0.9);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    white-space: nowrap;
    border: 1px solid var(--hairline-strong);
    color: var(--ink-dim);
    letter-spacing: 0.4px;
    font-weight: 500;
    transition: transform .35s var(--ease), box-shadow .3s var(--ease), background .3s var(--ease);
    will-change: left, top;
    pointer-events: auto;
    z-index: 3;
  }
  .orbit-chip[data-color="amber"]    { border-color: rgba(227, 176, 75,  0.65); color: #efc579; box-shadow: 0 0 14px rgba(227, 176, 75, 0.18); }
  .orbit-chip[data-color="cyan"]     { border-color: rgba(125, 211, 252, 0.65); color: #92dcf5; box-shadow: 0 0 14px rgba(125, 211, 252, 0.18); }
  .orbit-chip[data-color="sage"]     { border-color: rgba(126, 196, 168, 0.65); color: #94d4ba; box-shadow: 0 0 14px rgba(126, 196, 168, 0.18); }
  .orbit-chip[data-color="lavender"] { border-color: rgba(196, 181, 253, 0.65); color: #d2c5fc; box-shadow: 0 0 14px rgba(196, 181, 253, 0.18); }
  .orbit-chip[data-color="coral"]    { border-color: rgba(253, 164, 175, 0.65); color: #fcbac3; box-shadow: 0 0 14px rgba(253, 164, 175, 0.18); }
  .orbit-chip[data-color="yellow"]   { border-color: rgba(253, 224, 71,  0.55); color: #fbe88a; box-shadow: 0 0 14px rgba(253, 224, 71, 0.16); }
  .orbit-chip:hover {
    transform: translate(-50%, -50%) scale(1.18);
    z-index: 10;
    background: rgba(20, 20, 24, 1);
  }
  @media (max-width: 1080px) {
    .orbit-stage { max-width: 340px; }
    .orbit-chip { font-size: 10px; padding: 4px 9px; }
  }
  @media (max-width: 480px) {
    .orbit-stage { max-width: 290px; }
    .orbit-chip { font-size: 9.5px; padding: 3px 8px; }
    .orbit-hub { width: 58px; height: 58px; }
    .orbit-hub .core { width: 42px; height: 42px; }
  }

  .cap-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--hairline);
    border: 1px solid var(--hairline);
  }
  @media (max-width: 768px) { .cap-grid { grid-template-columns: 1fr; } }
  .cap { background: var(--bg); padding: 38px 36px; transition: background .3s var(--ease); }
  .cap:hover { background: var(--bg-soft); }
  .cap .num {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); letter-spacing: 1.5px;
    margin-bottom: 16px;
  }
  .cap h4 {
    font-family: var(--serif); font-weight: 400;
    font-size: 24px; letter-spacing: -0.02em;
    margin-bottom: 18px; line-height: 1.2;
  }
  .cap .chips { display: flex; flex-wrap: wrap; gap: 8px 10px; }
  .cap .chip {
    font-size: 12.5px;
    padding: 6px 12px; border-radius: 999px;
    color: var(--ink-dim);
    border: 1px solid var(--hairline-strong);
    transition: color .25s var(--ease), border-color .25s var(--ease), background .25s var(--ease);
  }
  .cap .chip:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

  /* ───── Focus ───── */
  .focus-list { display: grid; gap: 14px; }
  .focus {
    display: grid; grid-template-columns: 0.6fr 1fr 1fr auto;
    gap: 40px; padding: 36px;
    border: 1px solid var(--hairline);
    background: rgba(19, 19, 22, 0.4);
    border-radius: 4px;
    transition: border-color .35s var(--ease), background .35s var(--ease);
    align-items: start;
    position: relative;
    overflow: hidden;
  }
  .focus::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 0;
    background: var(--accent);
    transition: width .4s var(--ease);
  }
  .focus:hover { border-color: var(--hairline-strong); background: var(--bg-soft); }
  .focus:hover::before { width: 3px; }
  .focus:hover .f-no { color: var(--accent); }
  @media (max-width: 900px) { .focus { grid-template-columns: 1fr; gap: 16px; padding: 28px; } }
  .focus .f-no {
    font-family: var(--serif); font-weight: 300;
    font-size: 44px; line-height: 1;
    color: var(--ink-faint);
    letter-spacing: -0.02em;
    transition: color .35s var(--ease);
  }
  .focus h3 {
    font-family: var(--serif); font-weight: 400;
    font-size: 22px; letter-spacing: -0.02em;
    line-height: 1.25; margin-bottom: 6px;
  }
  .focus .meta-tag {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--ink-faint); letter-spacing: 1.4px;
    text-transform: uppercase;
  }
  .focus p { color: var(--ink-dim); font-size: 14.5px; line-height: 1.6; }
  .focus .stack {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-self: start; padding-top: 6px;
  }
  .focus .stack span {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--ink-dim);
    padding: 4px 10px; border-radius: 999px;
    border: 1px solid var(--hairline);
    letter-spacing: 0.3px;
  }

  /* ───── Recognition ───── */
  .recog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }
  .recog {
    background: rgba(19, 19, 22, 0.6);
    border: 1px solid var(--hairline);
    padding: 28px 26px;
    border-radius: 4px;
    transition: transform .4s var(--ease), border-color .35s var(--ease);
  }
  .recog:hover { transform: translateY(-4px); border-color: var(--accent); }
  .recog .ribbon {
    width: 38px; height: 38px;
    border: 1px solid var(--hairline-strong);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    margin-bottom: 22px;
  }
  .recog .type {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--ink-faint); letter-spacing: 1.4px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .recog h4 {
    font-family: var(--serif); font-weight: 400;
    font-size: 19px; line-height: 1.25;
    letter-spacing: -0.01em; margin-bottom: 6px;
  }
  .recog .issuer { color: var(--ink-dim); font-size: 13.5px; }

  /* ───── Flip cards (Recognition) ───── */
  .flip-card {
    perspective: 1200px;
    aspect-ratio: 0.85;
    cursor: pointer;
  }
  .flip-card-inner {
    position: relative;
    width: 100%; height: 100%;
    transition: transform .85s cubic-bezier(0.2, 0.8, 0.3, 1);
    transform-style: preserve-3d;
  }
  .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
  .flip-card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    /* Fully opaque background: backdrop-filter breaks backface-visibility */
    background: #16171b;
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 26px 24px;
    display: flex; flex-direction: column;
    transition: border-color .3s var(--ease);
    transform: rotateY(0deg);
  }
  .flip-card:hover .flip-card-face { border-color: var(--hairline-strong); }
  .flip-card-face .ribbon {
    width: 38px; height: 38px;
    border: 1px solid var(--hairline-strong);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    margin-bottom: 18px;
  }
  .flip-card-face .type {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--ink-faint); letter-spacing: 1.4px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .flip-card-face h4 {
    font-family: var(--serif); font-weight: 400;
    font-size: 19px; line-height: 1.25;
    letter-spacing: -0.01em; margin-bottom: 6px;
  }
  .flip-card-face .issuer { color: var(--ink-dim); font-size: 13.5px; }
  .flip-hint {
    margin-top: auto;
    font-family: var(--mono); font-size: 9.5px;
    color: var(--ink-faint);
    text-transform: uppercase; letter-spacing: 1.5px;
    display: flex; align-items: center; gap: 8px;
    padding-top: 18px;
  }
  .flip-hint::before { content: ''; width: 16px; height: 1px; background: var(--accent); }
  .flip-card-back {
    transform: rotateY(180deg);
    /* Opaque amber-tinted bg: keep below 100% transparency means front shows through */
    background: #1c1812;
    border-color: rgba(var(--accent-rgb), 0.4);
  }
  .flip-card-back .back-type {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--accent); letter-spacing: 1.4px;
    text-transform: uppercase; margin-bottom: 14px;
  }
  .flip-card-back h4 {
    font-family: var(--serif); font-weight: 400;
    font-size: 17px; line-height: 1.25;
    letter-spacing: -0.01em; margin-bottom: 10px;
  }
  .flip-card-back p {
    font-size: 13px; color: var(--ink-dim);
    line-height: 1.55; flex: 1;
  }

  /* ───── Contact ───── */
  .contact {
    padding: 140px 0 100px;
    border-top: 1px solid var(--hairline);
    text-align: center;
    background: rgba(12, 12, 13, 0.5);
  }
  .contact .small-cap {
    font-family: var(--mono); font-size: 11.5px;
    color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 24px;
  }
  .contact h2 {
    font-family: var(--serif); font-weight: 400;
    font-size: clamp(40px, 7vw, 100px);
    line-height: 0.98; letter-spacing: -0.035em;
    margin-bottom: 18px;
  }
  .contact h2 .it { font-style: italic; color: var(--accent); font-weight: 300; }
  .contact .blurb {
    color: var(--ink-dim); font-size: 18px;
    max-width: 580px; margin: 0 auto 50px;
    line-height: 1.55;
  }
  .mail-link {
    display: inline-flex; align-items: center; gap: 14px;
    text-decoration: none;
    font-family: var(--serif);
    font-size: clamp(22px, 2.6vw, 32px);
    color: var(--ink);
    letter-spacing: -0.02em;
    border-bottom: 1px solid var(--hairline-strong);
    padding-bottom: 14px;
    transition: color .3s var(--ease), border-color .3s var(--ease);
  }
  .mail-link:hover { color: var(--accent); border-color: var(--accent); }
  .mail-link .arr {
    width: 24px; height: 24px;
    border: 1px solid currentColor;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    transition: transform .3s var(--ease);
  }
  .mail-link:hover .arr { transform: rotate(45deg); }
  .contact-meta {
    margin-top: 60px;
    display: flex; justify-content: center; gap: 36px;
    flex-wrap: wrap;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .contact-meta a { color: var(--ink-dim); text-decoration: none; transition: color .25s var(--ease); }
  .contact-meta a:hover { color: var(--accent); }

  /* Contact form + profile card layout */
  .contact-grid {
    display: grid;
    grid-template-columns: 1.35fr 1fr;
    gap: 24px;
    margin: 60px auto 50px;
    text-align: left;
    align-items: stretch;
    max-width: 1000px;
  }
  @media (max-width: 900px) {
    .contact-grid { grid-template-columns: 1fr; gap: 18px; margin: 40px auto; }
  }

  .contact-form {
    background: rgba(19, 19, 22, 0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: 1px solid var(--hairline);
    border-radius: 6px;
    padding: 30px 30px 28px;
    display: flex; flex-direction: column;
  }
  .contact-form h3 {
    font-family: var(--serif); font-weight: 500;
    font-size: 22px; letter-spacing: -0.01em;
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 12px;
  }
  .contact-form h3::after {
    content: ''; flex: 1; height: 1px;
    background: var(--hairline);
  }
  .form-field { margin-bottom: 16px; }
  .form-field:last-of-type { flex: 1; display: flex; flex-direction: column; margin-bottom: 18px; }
  .form-field label {
    display: block;
    font-family: var(--mono); font-size: 10px;
    color: var(--ink-faint); letter-spacing: 1.3px;
    text-transform: uppercase; margin-bottom: 7px;
  }
  .form-field input, .form-field textarea {
    width: 100%;
    background: rgba(12, 12, 13, 0.7);
    border: 1px solid var(--hairline);
    border-radius: 4px;
    padding: 11px 13px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13.5px;
    transition: border-color .25s var(--ease), background .25s var(--ease);
  }
  .form-field textarea {
    resize: vertical; min-height: 110px; flex: 1;
    font-family: var(--sans); line-height: 1.5;
  }
  .form-field input:focus, .form-field textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(12, 12, 13, 0.95);
  }
  .form-submit {
    background: var(--ink); color: var(--bg);
    border: none; border-radius: 999px;
    padding: 13px 22px;
    font-family: var(--sans); font-size: 13.5px; font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    transition: background .25s var(--ease), transform .25s var(--ease);
    width: 100%;
  }
  .form-submit:hover { background: var(--accent); }
  .form-submit .arr { transition: transform .25s var(--ease); }
  .form-submit:hover .arr { transform: translate(3px, -3px); }
  .form-status {
    font-family: var(--mono); font-size: 10.5px;
    color: var(--signal); letter-spacing: 1px;
    text-transform: uppercase; margin-top: 10px;
    text-align: center; min-height: 14px;
    opacity: 0; transition: opacity .3s var(--ease);
  }
